<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Simplicio Snake Benchmark Fixture</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #10141c;
    color: #e8ecf4;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .screen { display: none; width: 420px; padding: 24px; text-align: center; }
  .screen.active { display: block; }
  h1 { font-size: 1.3rem; margin-bottom: 1rem; }
  input[type="text"] {
    font-size: 1rem;
    padding: 8px 10px;
    width: 220px;
    border-radius: 6px;
    border: 1px solid #3a4356;
    background: #1a2030;
    color: #e8ecf4;
  }
  button {
    font-size: 0.95rem;
    padding: 8px 16px;
    margin: 6px 4px;
    border-radius: 6px;
    border: 1px solid #3a4356;
    background: #2a3550;
    color: #e8ecf4;
    cursor: pointer;
  }
  button:hover { background: #34406b; }
  #game-canvas {
    background: #0b0e14;
    border: 2px solid #3a4356;
    touch-action: none;
    image-rendering: pixelated;
  }
  #score-bar { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
  .touch-controls { display: grid; grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px 48px; justify-content: center; gap: 4px; margin-top: 10px; }
  .touch-controls button { margin: 0; grid-column: auto; }
  #touch-up { grid-column: 2; grid-row: 1; }
  #touch-left { grid-column: 1; grid-row: 2; }
  #touch-right { grid-column: 3; grid-row: 2; }
  #touch-down { grid-column: 2; grid-row: 3; }
  ol#scoreboard-list, ol#scoreboard-list-home { text-align: left; padding-left: 24px; }
  .hint { font-size: 0.8rem; color: #8a94ab; margin-top: 10px; }
</style>
</head>
<body>

  <section id="name-screen" class="screen active" data-testid="name-screen">
    <h1>Simplicio Snake — Benchmark Fixture</h1>
    <p>Enter your name to start a run.</p>
    <input id="player-name" data-testid="name-input" type="text" placeholder="Player name" maxlength="24" autofocus />
    <br />
    <button id="start-btn" data-testid="start-button">Start</button>
    <h2>Top 10 scoreboard</h2>
    <ol id="scoreboard-list-home" data-testid="scoreboard-list-home"></ol>
    <p class="hint">Arrow keys / WASD / on-screen buttons / swipe to move.</p>
  </section>

  <section id="game-screen" class="screen" data-testid="game-screen">
    <div id="score-bar">
      <span>Player: <strong id="active-player-name" data-testid="active-player-name"></strong></span>
      <span>Score: <strong id="score" data-testid="score">0</strong></span>
    </div>
    <canvas id="game-canvas" data-testid="game-canvas" width="400" height="400"></canvas>
    <div class="touch-controls" data-testid="touch-controls">
      <button id="touch-up" data-dir="up" data-testid="touch-up">&uarr;</button>
      <button id="touch-left" data-dir="left" data-testid="touch-left">&larr;</button>
      <button id="touch-right" data-dir="right" data-testid="touch-right">&rarr;</button>
      <button id="touch-down" data-dir="down" data-testid="touch-down">&darr;</button>
    </div>
  </section>

  <section id="gameover-screen" class="screen" data-testid="gameover-screen">
    <h1>Game Over</h1>
    <p>Final score: <strong id="final-score" data-testid="final-score">0</strong></p>
    <h2>Top 10 scoreboard</h2>
    <ol id="scoreboard-list" data-testid="scoreboard-list"></ol>
    <button id="restart-btn" data-testid="restart-button">Play Again</button>
    <button id="change-player-btn" data-testid="change-player-button">Change Player</button>
  </section>

<script>
(function () {
  "use strict";

  // ---------------------------------------------------------------------
  // Config / URL params
  //
  // ?fast=1     -- shortens the tick interval, for quick E2E/perf runs.
  // ?seed=<n>   -- seeds the food-placement RNG (mulberry32) so a run is
  //                fully reproducible, which the perf harness needs to
  //                compare like-for-like across engines/agents.
  // ?testSeam=1 -- TEST-ONLY determinism seam. When set, food always
  //                spawns one cell ahead of the snake's head in its
  //                current direction, so an automated test can score
  //                points deterministically without depending on canvas
  //                pixel timing or random food placement. Never enabled
  //                in a normal run; documented here and in README.md.
  // ---------------------------------------------------------------------
  const params = new URLSearchParams(window.location.search);
  const FAST = params.get("fast") === "1";
  const TEST_SEAM = params.get("testSeam") === "1";
  const SEED = params.has("seed") ? Number(params.get("seed")) : null;

  const COLS = 20;
  const ROWS = 20;
  const CELL = 20;
  const TICK_MS = FAST ? 25 : 120;
  const SCOREBOARD_KEY = "simplicio_snake_scoreboard_v1";
  const MAX_SCOREBOARD_ENTRIES = 10;

  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rng = SEED !== null ? mulberry32(SEED) : Math.random;

  // ---------------------------------------------------------------------
  // Scoreboard persistence (localStorage, bounded, deterministic order)
  // ---------------------------------------------------------------------
  function loadScoreboard() {
    try {
      const raw = window.localStorage.getItem(SCOREBOARD_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function saveScoreboard(entries) {
    window.localStorage.setItem(SCOREBOARD_KEY, JSON.stringify(entries));
  }

  function sortScoreboard(entries) {
    return entries
      .slice()
      .sort((a, b) => (b.score - a.score) || (a.ts - b.ts));
  }

  function recordScore(name, score) {
    const entries = loadScoreboard();
    entries.push({ name: String(name || "Anonymous").slice(0, 24), score: Number(score) || 0, ts: Date.now() });
    const bounded = sortScoreboard(entries).slice(0, MAX_SCOREBOARD_ENTRIES);
    saveScoreboard(bounded);
    return bounded;
  }

  function renderScoreboard(listEl) {
    if (!listEl) return;
    const entries = sortScoreboard(loadScoreboard());
    listEl.innerHTML = "";
    entries.forEach((entry) => {
      const li = document.createElement("li");
      li.textContent = entry.name + " — " + entry.score;
      li.dataset.score = String(entry.score);
      li.dataset.name = entry.name;
      listEl.appendChild(li);
    });
  }

  function renderAllScoreboards() {
    renderScoreboard(document.getElementById("scoreboard-list-home"));
    renderScoreboard(document.getElementById("scoreboard-list"));
  }

  // ---------------------------------------------------------------------
  // Screens
  // ---------------------------------------------------------------------
  const screens = {
    name: document.getElementById("name-screen"),
    game: document.getElementById("game-screen"),
    gameover: document.getElementById("gameover-screen"),
  };

  function showScreen(key) {
    Object.values(screens).forEach((el) => el.classList.remove("active"));
    screens[key].classList.add("active");
  }

  // ---------------------------------------------------------------------
  // Game state
  // ---------------------------------------------------------------------
  const canvas = document.getElementById("game-canvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const finalScoreEl = document.getElementById("final-score");
  const activePlayerNameEl = document.getElementById("active-player-name");

  let playerName = "";
  let snake, direction, nextDirection, food, score, loopHandle, running;

  function resetState() {
    snake = [
      { x: 8, y: 10 },
      { x: 7, y: 10 },
      { x: 6, y: 10 },
    ];
    direction = "right";
    nextDirection = "right";
    score = 0;
    running = true;
    food = placeFood();
    scoreEl.textContent = "0";
  }

  function randomFreeCell() {
    let cell;
    do {
      cell = { x: Math.floor(rng() * COLS), y: Math.floor(rng() * ROWS) };
    } while (snake.some((s) => s.x === cell.x && s.y === cell.y));
    return cell;
  }

  function placeFood() {
    if (TEST_SEAM) {
      const head = snake[0];
      const delta = DIRS[direction];
      let x = head.x + delta.x;
      let y = head.y + delta.y;
      // Keep the deterministic seam on-grid even near an edge.
      x = Math.max(0, Math.min(COLS - 1, x));
      y = Math.max(0, Math.min(ROWS - 1, y));
      return { x, y };
    }
    return randomFreeCell();
  }

  const DIRS = {
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 },
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 },
  };
  const OPPOSITE = { up: "down", down: "up", left: "right", right: "left" };

  function setDirection(dir) {
    if (!DIRS[dir]) return;
    if (snake.length > 1 && OPPOSITE[dir] === direction) return; // no reversing into self
    nextDirection = dir;
  }

  function tick() {
    if (!running) return;
    direction = nextDirection;
    const delta = DIRS[direction];
    const head = { x: snake[0].x + delta.x, y: snake[0].y + delta.y };

    const hitWall = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS;
    const hitSelf = snake.some((s) => s.x === head.x && s.y === head.y);
    if (hitWall || hitSelf) {
      endGame();
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = String(score);
      food = placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.fillStyle = "#0b0e14";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#e63946";
    ctx.fillRect(food.x * CELL, food.y * CELL, CELL - 1, CELL - 1);
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? "#7ee787" : "#3fb950";
      ctx.fillRect(seg.x * CELL, seg.y * CELL, CELL - 1, CELL - 1);
    });
  }

  function startGame() {
    resetState();
    activePlayerNameEl.textContent = playerName;
    showScreen("game");
    draw();
    if (loopHandle) clearInterval(loopHandle);
    loopHandle = setInterval(tick, TICK_MS);
  }

  function endGame() {
    running = false;
    clearInterval(loopHandle);
    finalScoreEl.textContent = String(score);
    recordScore(playerName, score);
    renderAllScoreboards();
    showScreen("gameover");
  }

  // ---------------------------------------------------------------------
  // Input: keyboard, on-screen touch buttons, canvas swipe
  // ---------------------------------------------------------------------
  const KEY_MAP = {
    ArrowUp: "up", w: "up", W: "up",
    ArrowDown: "down", s: "down", S: "down",
    ArrowLeft: "left", a: "left", A: "left",
    ArrowRight: "right", d: "right", D: "right",
  };

  window.addEventListener("keydown", (e) => {
    const dir = KEY_MAP[e.key];
    if (dir) {
      setDirection(dir);
      e.preventDefault();
    }
  });

  document.querySelectorAll(".touch-controls button").forEach((btn) => {
    btn.addEventListener("click", () => setDirection(btn.dataset.dir));
  });

  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener("touchend", (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDirection(dx > 0 ? "right" : "left");
    } else {
      setDirection(dy > 0 ? "down" : "up");
    }
    touchStart = null;
  }, { passive: true });

  // ---------------------------------------------------------------------
  // Screen wiring
  // ---------------------------------------------------------------------
  const nameInput = document.getElementById("player-name");
  document.getElementById("start-btn").addEventListener("click", () => {
    playerName = (nameInput.value || "").trim() || "Anonymous";
    startGame();
  });
  nameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      playerName = (nameInput.value || "").trim() || "Anonymous";
      startGame();
    }
  });

  document.getElementById("restart-btn").addEventListener("click", () => {
    startGame();
  });
  document.getElementById("change-player-btn").addEventListener("click", () => {
    nameInput.value = "";
    showScreen("name");
    renderAllScoreboards();
    nameInput.focus();
  });

  // ---------------------------------------------------------------------
  // Test/perf-harness introspection API (read-only; does not alter or
  // bypass the real game logic above).
  // ---------------------------------------------------------------------
  window.__snake = {
    getScore: () => score,
    getScoreboard: () => sortScoreboard(loadScoreboard()),
    getPlayerName: () => playerName,
    isRunning: () => Boolean(running),
    recordScore, // same function invoked internally on real game-over
  };

  renderAllScoreboards();
  window.__snakeFixtureReady = true;
})();
</script>
</body>
</html>
