# Reviewed inventory for issue #517.
# Scope: every tracked .json/.jsonl/.ndjson file on the branch, plus audited producer/consumer modules.
# This is an inventory slice, not a claim that the issue-wide migration is complete.
format = "simplicio-agent.json-boundaries/v1"
issue = 517
source_extensions = [".json", ".jsonl", ".ndjson"]

[[audit]]
kind = "module"
paths = [
  "desktop/src/lib/persisted.ts",
  "desktop/src/lib/json-format.ts",
  "agent/serde/fast_json.py",
  "agent/state_migration.py",
  "agent/event_store.py",
  "agent/memory_manager.py",
  "agent/session_repositories.py",
  "agent/benchmark_manifest.py",
  "tools/runtime_manager.py",
  "tools/kernel_binding.py",
  "gateway/mirror.py",
  "gateway/session.py",
  "gateway/rich_sent_store.py"
]
producer = "Agent, desktop, gateway and adapter serializers/readers"
consumer = "Agent state, desktop persistence, gateway mirrors, tools and Runtime handoff"
lifecycle = "source module containing a JSON boundary; migrate only after producer/consumer and compatibility contract are verified"
category = "owned internal boundary or adapter-contained external boundary"
owner = "simplicio-agent; simplicio-runtime for Runtime-owned HBP/HBI contracts"
target_format = "HBP/HBI/TOML according to ownership; raw external tool-call JSON remains adapter-contained"

[[audit]]
kind = "adapter"
paths = ["agent/tool_call_json.py"]
producer = "OpenAI-style tool-call adapter"
consumer = "external tool-call protocol"
lifecycle = "third-party JSON at an explicit adapter boundary"
category = "external protocol adapter"
owner = "simplicio-agent tool adapter maintainers"
target_format = "preserve external JSON at adapter boundary"
status = "exception"
reason = "JSON is the wire format owned by the external tool-call protocol; it must not enter internal state types."
expires = "2099-12-31"

