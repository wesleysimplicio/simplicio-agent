schema: simplicio.ci-quality-gates/v1

# This file is the reviewable policy contract consumed by the workflow and
# tests. Keep thresholds here rather than duplicating them in shell snippets.
merge_blocking: true
aggregate_check: quality-gates

required_checks:
  - unit
  - integration
  - security
  - cost
  - coverage
  - diagnostics

coverage:
  global_minimum_percent: 85
  critical_minimum_percent: 90
  critical_scopes:
    - agent
    - gateway
    - hermes_cli

cost:
  baseline: tools/perf_gate/baseline_ci.json
  max_regression_percent: 20
  missing_baseline_status: UNVERIFIED

# External providers, credentials, and hosted services are deliberately not
# exercised by this deterministic workflow. This is a visible status, never a
# passing E2E claim.
external_e2e:
  availability: unavailable
  status: UNVERIFIED
  reason: credentials and external services are not available in this gate
