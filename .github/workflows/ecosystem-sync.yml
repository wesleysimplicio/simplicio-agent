name: ecosystem-sync

# Repeatable "ecosystem sync pipeline" gate.
#
# Pipeline: Hermes -> Hermes Turbo -> Simplicio (this repo).
# Simplicio is NEWER than Turbo, so this workflow is DRY-RUN by default and
# never auto-pushes synced content. A human opts into --apply via the
# `mode` input; even then this job does not push — it only reports + validates.
#
# What it runs:
#   1. scripts/sync/ecosystem-sync.sh simplicio-pull-perf --dry-run
#   2. scripts/sync/ecosystem-sync.sh validate
#   3. Posts a summary to the workflow run.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode (dry-run reports only; apply copies files, never pushes)"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
  schedule:
    # Weekly, Mondays 06:00 UTC. Always dry-run on schedule.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  sync-perf-dry-run:
    name: simplicio-pull-perf (${{ github.event.inputs.mode || 'dry-run' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Simplicio
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev + fast extras (best effort)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,fast]" || pip install pytest pytest-asyncio || true

      - name: Resolve sync mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode || 'dry-run' }}"
          if [ "$MODE" = "apply" ]; then
            echo "flag=--apply" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--dry-run" >> "$GITHUB_OUTPUT"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

      - name: simplicio-pull-perf (${{ steps.mode.outputs.mode }})
        id: pull
        env:
          # Turbo is not checked out in CI; the pull step degrades gracefully and
          # the ordering guard reports "cannot verify" rather than failing.
          SIMPLICIO_REPO: ${{ github.workspace }}
        run: |
          set -o pipefail
          bash scripts/sync/ecosystem-sync.sh simplicio-pull-perf ${{ steps.mode.outputs.flag }} \
            2>&1 | tee /tmp/pull-perf.log

      - name: Validation gate
        id: validate
        env:
          SIMPLICIO_REPO: ${{ github.workspace }}
        run: |
          set -o pipefail
          bash scripts/sync/ecosystem-sync.sh validate 2>&1 | tee /tmp/validate.log

      - name: Post summary
        if: always()
        run: |
          {
            echo "## Ecosystem sync — ${{ steps.mode.outputs.mode }}"
            echo ""
            echo "Pipeline: Hermes -> Turbo -> Simplicio (Simplicio is newer; additive-only)."
            echo ""
            echo "### simplicio-pull-perf"
            echo '```'
            tail -n 40 /tmp/pull-perf.log 2>/dev/null || echo "(no output)"
            echo '```'
            echo "### validate"
            echo '```'
            tail -n 40 /tmp/validate.log 2>/dev/null || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
