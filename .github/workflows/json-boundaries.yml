name: JSON boundary quality gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build release wheel
        run: python -m pip wheel --no-deps --no-build-isolation . --wheel-dir dist
      - name: Run release-blocking boundary scan
        run: >-
          python scripts/check_json_boundaries.py
          --mode release
          --package dist/*.whl
          --report json-boundary-quality.json
      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-boundary-quality
          path: json-boundary-quality.json
