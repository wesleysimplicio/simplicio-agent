name: Quality Gates

on:
  workflow_call: {}
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  QUALITY_CONFIG: .github/quality-gates.yml

jobs:
  unit:
    name: Unit gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --python 3.11 --extra dev
      - run: uv run pytest tests/ci -q --junitxml=quality-gate-unit.xml
      - name: Upload unit receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-unit-receipt
          path: quality-gate-unit.xml
          if-no-files-found: warn
          retention-days: 14

  integration:
    name: Integration gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --python 3.11 --extra dev
      - run: >-
          uv run pytest
          tests/agent/test_task_envelope_bridge.py
          tests/agent/test_protocol_v1.py
          tests/tools/test_benchmark_gate.py
          -q --junitxml=quality-gate-integration.xml
      - name: Upload integration receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-integration-receipt
          path: quality-gate-integration.xml
          if-no-files-found: warn
          retention-days: 14

  security:
    name: Security gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      # The distributed protocol contract uses the optional msgspec fast path;
      # install that extra explicitly so the gate is reproducible from a clean
      # checkout rather than depending on a developer's environment.
      - run: uv sync --locked --python 3.11 --extra dev --extra fast
      - run: >-
          uv run pytest
          tests/gateway/test_reply_to_injection.py
          tests/gateway/test_fresh_reset_skill_injection.py
          tests/tools/test_smart_approval_injection.py
          tests/agent/test_trust_boundary.py
          tests/agent/distributed/test_protocol.py
          tests/agent/test_autonomy_policy.py
          -q --junitxml=quality-gate-security.xml
      - name: Upload security receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-security-receipt
          path: quality-gate-security.xml
          if-no-files-found: warn
          retention-days: 14

  cost:
    name: Cost and latency gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --python 3.11 --extra dev
      - run: >-
          uv run pytest
          tests/router/test_cost_aware.py
          tests/hermes_cli/test_model_cost_guard.py
          tests/run_agent/test_background_review_cost_controls.py
          tests/tools/test_perf_gate.py
          -q --junitxml=quality-gate-cost.xml
      - name: Compare offline cost/latency baseline
        run: uv run python -m tools.perf_gate.compare --json quality-gates-cost-report.json
      - name: Record bootstrap status when no report exists
        if: always()
        run: >-
          python -c "import json, pathlib; p=pathlib.Path('quality-gates-cost-report.json'); p.exists() or p.write_text(json.dumps({'schema':'simplicio.ci-quality-gates.cost-receipt/v1','status':'UNVERIFIED','reason':'baseline comparison did not emit a report'}, indent=2) + '\n', encoding='utf-8')"
      - name: Upload cost/latency report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-cost-report
          path: quality-gates-cost-report.json
          if-no-files-found: warn
          retention-days: 14
      - name: Upload cost test receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-cost-receipt
          path: quality-gate-cost.xml
          if-no-files-found: warn
          retention-days: 14

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --python 3.11 --extra dev
      - name: Install pinned coverage tools
        run: uv pip install --python .venv coverage==7.15.0 pytest-cov==6.1.1
      - run: >-
          uv run pytest tests/ci/test_quality_gates.py
          --cov=tests/ci
          --cov-config=.coveragerc
          --cov-report=term-missing
          --cov-report=json:quality-gates-coverage.json
          --junitxml=quality-gate-coverage.xml
          --cov-fail-under=85
          -q
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-coverage-report
          path: quality-gates-coverage.json
          if-no-files-found: warn
          retention-days: 14
      - name: Upload coverage test receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-coverage-receipt
          path: quality-gate-coverage.xml
          if-no-files-found: warn
          retention-days: 14

  diagnostics:
    name: Diagnostics gate
    runs-on: windows-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv sync --locked --python 3.11 --extra dev
      - run: uv run pytest tests/ci -q --junitxml=quality-gate-diagnostics.xml
      - run: uv run ruff check tests/ci
      - name: Upload Windows diagnostics receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-diagnostics-receipt
          path: quality-gate-diagnostics.xml
          if-no-files-found: warn
          retention-days: 14

  quality-gates:
    name: All quality gates pass
    needs: [unit, integration, security, cost, coverage, diagnostics]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Evaluate required gate results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: >-
          python -c "import json, os, pathlib, sys; needs=json.loads(os.environ['RESULTS']); results={name: value['result'] for name, value in needs.items()}; pathlib.Path('quality-gates-summary.json').write_text(json.dumps({'schema':'simplicio.ci-quality-gates.receipt/v1','results':results}, indent=2) + '\n', encoding='utf-8'); print('required quality gates:', results); sys.exit(1 if any(result != 'success' for result in results.values()) else 0)"
      - name: Upload aggregate receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-gates-summary
          path: quality-gates-summary.json
          if-no-files-found: warn
          retention-days: 14
