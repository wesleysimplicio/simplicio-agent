name: Release

# Triggered by CalVer tag pushes from scripts/release.py (e.g. v2026.5.15)
# or manually from the Actions tab.
on:
  push:
    tags:
      - "v20*"  # CalVer tags: v2026.5.15, v2026.5.15.2, etc.
  workflow_dispatch:
    inputs:
      confirm_tag:
        description: "Tag to build and release (e.g. v2026.5.15). Must already exist."
        required: true
        type: string

# Restrict default token to read-only; each job escalates as needed.
permissions:
  contents: read

# Prevent overlapping releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Binary artifact name
  BINARY_NAME: hermes
  # FTP target path (from secrets)
  FTP_PATH: ${{ secrets.FTP_PATH }}

jobs:
  ##########################################################################
  # BUILD: Compile standalone binary + sign + checksum
  ##########################################################################
  build:
    name: Build release binary 🔨
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      binary_path: ${{ steps.binary.outputs.binary_path }}
      signature_path: ${{ steps.sign.outputs.signature_path }}
      checksums_path: ${{ steps.checksums.outputs.checksums_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.confirm_tag || github.ref }}
          fetch-tags: true

      - name: Validate tag exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git tag -l "${{ inputs.confirm_tag }}" | grep -q .; then
            echo "::error::Tag '${{ inputs.confirm_tag }}' does not exist in the repo"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release for version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5.2.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Build web dashboard
        run: cd web && npm ci && npm run build

      - name: Build TUI bundle
        run: cd ui-tui && npm ci && npm run build

      - name: Bundle TUI and web into hermes_cli
        run: |
          mkdir -p hermes_cli/tui_dist
          cp ui-tui/dist/entry.js hermes_cli/tui_dist/entry.js

      - name: Verify frontend assets exist
        run: |
          test -f hermes_cli/web_dist/index.html || { echo "ERROR: web_dist not built"; exit 1; }
          test -f hermes_cli/tui_dist/entry.js || { echo "ERROR: tui_dist not built"; exit 1; }

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install --python 3.13 -e .
          uv pip install --python 3.13 pyinstaller

      - name: Build standalone binary with PyInstaller
        id: binary
        run: |
          source .venv/bin/activate
          pyinstaller --clean --distpath ./release_dist --workpath ./build_tmp \
            hermes_cli.spec

          # Determine platform suffix
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
          esac
          PLATFORM="${OS}-${ARCH}"

          BINARY_NAME="${{ env.BINARY_NAME }}-v${{ steps.version.outputs.version }}-${PLATFORM}"
          mv ./release_dist/hermes "./release_dist/${BINARY_NAME}"

          BINARY_PATH="./release_dist/${BINARY_NAME}"
          echo "binary_path=${BINARY_PATH}" >> "$GITHUB_OUTPUT"
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Install minisign for ed25519 signing
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign

      - name: Generate signing key (if not present)
        run: |
          # In CI the secret key comes from a GitHub secret.
          # If MINISIGN_SECRET_KEY is set, write it to a temp file.
          if [ -n "${{ secrets.MINISIGN_SECRET_KEY }}" ]; then
            echo "${{ secrets.MINISIGN_SECRET_KEY }}" > /tmp/minisign.key
          else
            # Generate a throwaway key for testing (not suitable for production)
            echo "::warning::No MINISIGN_SECRET_KEY secret found — generating ephemeral key"
            minisign -G -p /tmp/minisign.pub -s /tmp/minisign.key -W
          fi

      - name: Sign binary with ed25519
        id: sign
        run: |
          BINARY_PATH="${{ steps.binary.outputs.binary_path }}"
          minisign -Sm "${BINARY_PATH}" -s /tmp/minisign.key -W
          SIGNATURE_PATH="${BINARY_PATH}.minisig"
          echo "signature_path=${SIGNATURE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          BINARY_PATH="${{ steps.binary.outputs.binary_path }}"
          SIGNATURE_PATH="${{ steps.sign.outputs.signature_path }}"
          CHECKSUMS_PATH="./release_dist/SHA256SUMS"

          {
            sha256sum "${BINARY_PATH}" | sed 's|./release_dist/||'
            sha256sum "${SIGNATURE_PATH}" | sed 's|./release_dist/||'
          } > "${CHECKSUMS_PATH}"

          # Also sign the checksums file
          minisign -Sm "${CHECKSUMS_PATH}" -s /tmp/minisign.key -W

          echo "checksums_path=${CHECKSUMS_PATH}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Checksums ==="
          cat "${CHECKSUMS_PATH}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.2.0
        with:
          name: release-artifacts
          path: |
            ./release_dist/*
          retention-days: 14

  ##########################################################################
  # RUST WHEELS: Build hermes_fast (rust_ext/) wheels with maturin — #113
  #
  # Scoped to manylinux x86_64 only for this PR (see issue #113 discussion).
  # aarch64/macOS/Windows wheels are a follow-up once this path is proven;
  # the pure-Python fallback in agent/_hermes_fast.py keeps every other
  # platform working exactly as before (this job is purely additive).
  ##########################################################################
  build-rust-ext-wheel:
    name: Build hermes_fast wheel (manylinux x86_64) 🦀
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.confirm_tag || github.ref }}
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Build wheels with maturin (manylinux2014 x86_64)
        id: maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: rust_ext
          target: x86_64
          manylinux: auto
          args: --release --out dist --find-interpreter

      - name: List built wheels + record size (issue #113 wheel-size guardrail)
        run: |
          set -euo pipefail
          ls -la rust_ext/dist/
          echo "### hermes_fast wheel sizes" >> "$GITHUB_STEP_SUMMARY"
          for whl in rust_ext/dist/*.whl; do
            SIZE_KB=$(du -k "$whl" | cut -f1)
            echo "- \`$(basename "$whl")\`: ${SIZE_KB} KiB" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Install built wheel + test dependencies
        run: |
          set -euo pipefail
          python3 -m venv /tmp/rust-ext-test-venv
          source /tmp/rust-ext-test-venv/bin/activate
          pip install --quiet rust_ext/dist/*.whl
          pip install --quiet pytest
          python3 -c "import hermes_fast; print('hermes_fast loaded from', hermes_fast.__file__)"

      - name: Run test_hermes_fast.py against the compiled extension (AC #113)
        env:
          # Also exercise the Rust estimate/truncate path (opt-in in
          # production, but worth covering here since the wheel is built).
          HERMES_RUST_ESTIMATES: "1"
        run: |
          set -euo pipefail
          source /tmp/rust-ext-test-venv/bin/activate
          python3 -m pytest tests/agent/test_hermes_fast.py -v

      - name: Upload hermes_fast wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.2.0
        with:
          name: hermes-fast-wheels
          path: rust_ext/dist/*.whl
          retention-days: 14

  ##########################################################################
  # PUBLISH: Create GitHub Release + FTP upload
  ##########################################################################
  publish:
    name: Publish release 🚀
    needs: [build, build-rust-ext-wheel]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create/update GitHub Release

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          path: ./release_dist

      - name: Download hermes_fast wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: hermes-fast-wheels
          path: ./release_dist

      - name: List artifacts
        run: ls -la ./release_dist/

      - name: Create GitHub Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ needs.build.outputs.version }}"

          # Build release notes
          NOTES=$(cat <<EONOTES
          ## Hermes Agent v${VERSION}

          **Binary downloads for Linux (amd64):**

          This release includes a standalone binary built with PyInstaller,
          signed with ed25519, with SHA256 checksums.

          **\`hermes_fast\` native extension (manylinux x86_64):**

          A prebuilt \`hermes_fast-*.whl\` (Rust hot-path extension, see
          \`rust_ext/\`) is attached below. Install it into the same
          environment as \`hermes-agent\`/\`simplicio-agent\` with
          \`pip install hermes_fast-*.whl\` to get the native streaming
          tool-call parser without a Rust toolchain on the target machine.
          Other platforms keep working via the pure-Python fallback in
          \`agent/_hermes_fast.py\` — this wheel is additive, never required.

          ### Verification

          1. Download the binary and \`.minisig\` signature file
          2. Install \`minisign\`: https://jedisct1.github.io/minisign/
          3. Verify: \`minisign -Vm hermes-* -p RELEASE_PUBKEY.pub\`
          4. Verify checksums: \`sha256sum -c SHA256SUMS\`
          EONOTES
          )

          echo "${NOTES}" > /tmp/release_notes.md

          # Upload all artifacts to the release
          gh release create "${TAG}" \
            --title "Hermes Agent v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            ./release_dist/*

          echo "release_url=$(gh release view "${TAG}" --json url -q '.url')" >> "$GITHUB_OUTPUT"

      - name: Upload via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          # Install lftp for robust FTP transfers
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          TAG="${{ github.ref_name }}"
          VERSION="${{ needs.build.outputs.version }}"

          # Generate FTP commands
          lftp -c "
            set ftp:ssl-allow no
            set ssl:verify-certificate no
            open -u \"${FTP_USER}\",\"${FTP_PASS}\" \"${FTP_HOST}\"
            mkdir -p \"${FTP_PATH}/${VERSION}\"
            mkdir -p \"${FTP_PATH}/latest\"
            mirror --reverse --verbose ./release_dist/ \"${FTP_PATH}/${VERSION}/\"
            mirror --reverse --verbose ./release_dist/ \"${FTP_PATH}/latest/\"
            quit
          "

      - name: Verify FTP upload
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "FTP upload completed to: ftp://${FTP_HOST}${FTP_PATH}/${VERSION}/"
          echo "Latest symlink: ftp://${FTP_HOST}${FTP_PATH}/latest/"
