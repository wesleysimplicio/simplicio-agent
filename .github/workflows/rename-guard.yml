name: Rename Guard

# Deterministic, offline guard against branding regressions (issue #194).
# Fails a PR that introduces a new, unclassified old-brand occurrence not
# covered by tools/rename_guard/allowlist.json or the frozen baseline in
# tools/rename_guard/baseline.json.
#
# Two tiers, matching the issue's "PR smoke vs. release deep scan" AC:
#   - ``rename-guard``  — git-tracked source only. Runs on every PR/push;
#     no build step, sub-5-minute budget.
#   - ``artifact-scan``  — builds the actual wheel + sdist (``uv build``,
#     the same command ``upload_to_pypi.yml`` runs) and re-scans their
#     packaged contents. Slower (a real build), so it's release-only:
#     skipped on pull_request, runs on push (main) and workflow_dispatch.

on:
  workflow_call:
    inputs:
      event_name:
        description: The event name from the calling orchestrator (pull_request or push).
        type: string
        required: false
        default: pull_request

permissions:
  contents: read

jobs:
  rename-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run rename guard
        run: |
          set -o pipefail
          python3 -m tools.rename_guard.scanner --json | tee rename-guard-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rename-guard-report
          path: rename-guard-report.json
          retention-days: 14

  artifact-scan:
    name: Rename guard (packaged wheel + sdist)
    # Deep scan only: a real ``uv build`` is too slow/heavy for every PR
    # smoke run. Runs on push (main) and manual dispatch, skipped on
    # pull_request per the issue's performance AC.
    if: inputs.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5.2.0

      - name: Run artifact rename guard (builds wheel + sdist, scans contents)
        run: |
          set -o pipefail
          python3 -m tools.rename_guard.artifact_scan --json | tee rename-guard-artifact-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rename-guard-artifact-report
          path: rename-guard-artifact-report.json
          retention-days: 14
