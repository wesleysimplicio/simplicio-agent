name: Rename Guard

# Deterministic, offline guard against branding regressions (issue #194).
# Fails a PR that introduces a new, unclassified old-brand occurrence not
# covered by tools/rename_guard/allowlist.json or the frozen baseline in
# tools/rename_guard/baseline.json.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  rename-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run rename guard
        run: |
          set -o pipefail
          python3 -m tools.rename_guard.scanner --json | tee rename-guard-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rename-guard-report
          path: rename-guard-report.json
          retention-days: 14
