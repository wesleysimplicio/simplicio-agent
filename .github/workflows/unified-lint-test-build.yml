name: Unified Lint, Test, Build

# Reusable workflow for lint, test, and build (docker) that can be called from other workflows.
# Inputs allow controlling which steps to run and configuring test slicing.

on:
  workflow_call:
    inputs:
      run-lint:
        description: 'Run lint job'
        required: false
        type: boolean
        default: true
      run-test:
        description: 'Run test job'
        required: false
        type: boolean
        default: true
      run-build:
        description: 'Run build (docker) job'
        required: false
        type: boolean
        default: true
      slice-count:
        description: 'Number of parallel test slices'
        required: false
        type: number
        default: 8
      event-name:
        description: 'Event name (push or pull_request)'
        required: false
        type: string
        default: 'push'
      base-ref:
        description: 'Base ref for diff (used by lint)'
        required: false
        type: string
        default: ''
      head-ref:
        description: 'Head ref for diff (used by lint)'
        required: false
        type: string
        default: ''

jobs:
  # Lint job (ruff + ty)
  lint:
    if: ${{ inputs.run-lint }}
    name: Lint (ruff + ty)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # need full history for merge-base + worktree
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
      - name: Install ruff + ty
        run: |
          uv tool install ruff && uv tool install ty
      - name: Determine base ref
        id: base
        run: |
          if [ "${{ inputs.event-name }}" = "pull_request" ]; then
            BASE_SHA=$(git merge-base "origin/${{ inputs.base-ref }}" HEAD)
            BASE_REF="origin/${{ inputs.base-ref }}"
          else
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
            BASE_REF="HEAD~1"
          fi
          echo "sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "ref=$BASE_REF" >> $GITHUB_OUTPUT
          echo "Base SHA: $BASE_SHA"
          echo "Base ref: $BASE_REF"
      - name: Run ruff + ty on HEAD
        run: |
          mkdir -p .lint-reports/head
          ruff check --output-format json --exit-zero > .lint-reports/head/ruff.json || true
          ty check --output-format gitlab --exit-zero > .lint-reports/head/ty.json || true
          echo "HEAD ruff: $(wc -c < .lint-reports/head/ruff.json) bytes"
          echo "HEAD ty:   $(wc -c < .lint-reports/head/ty.json) bytes"
      - name: Run ruff + ty on base (via git worktree)
        run: |
          mkdir -p .lint-reports/base
          HEAD_SHA=$(git rev-parse HEAD)
          BASE_SHA="${{ steps.base.outputs.sha }}"
          if [ "$BASE_SHA" = "$HEAD_SHA" ]; then
            echo "Base SHA == HEAD SHA, skipping base scan."
            echo '[]' > .lint-reports/base/ruff.json
            echo '[]' > .lint-reports/base/ty.json
          else
            git worktree add --detach /tmp/lint-base "$BASE_SHA"
            (
              cd /tmp/lint-base
              ruff check --output-format json --exit-zero > "$GITHUB_WORKSPACE/.lint-reports/base/ruff.json" || true
              ty check --output-format gitlab --exit-zero > "$GITHUB_WORKSPACE/.lint-reports/base/ty.json" || true
            )
            git worktree remove --force /tmp/lint-base
          fi
          echo "base ruff: $(wc -c < .lint-reports/base/ruff.json) bytes"
          echo "base ty:   $(wc -c < .lint-reports/base/ty.json) bytes"
      - name: Generate diff summary
        run: |
          python scripts/lint_diff.py \
            --base-ruff .lint-reports/base/ruff.json \
            --head-ruff .lint-reports/head/ruff.json \
            --base-ty   .lint-reports/base/ty.json \
            --head-ty   .lint-reports/head/ty.json \
            --base-ref  "${{ steps.base.outputs.ref }}" \
            --head-ref  "${{ inputs.event-name == 'pull_request' && inputs.head-ref || github.ref_name }}" \
            --output    .lint-reports/summary.md
          cat .lint-reports/summary.md >> $GITHUB_STEP_SUMMARY

  # Test job (pytest with slicing)
  test:
    if: ${{ inputs.run-test }}
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install ripgrep (prebuilt binary)
        run: |
          set -euo pipefail
          RG_VERSION=15.1.0
          RG_SHA256=1c9297be4a084eea7ecaedf93eb03d058d6faae29bbc57ecdaf5063921491599
          RG_TARBALL=ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl.tar.gz
          curl -sSfL --retry 3 --retry-delay 5 -o "$RG_TARBALL" \
            "https://github.com/BurntSushi/ripgrep/download/${RG_VERSION}/${RG_TARBALL}"
          echo "${RG_SHA256}  $RG_TARBALL" | sha256sum -c -
          tar -xzf "$RG_TARBALL"
          sudo mv "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl/rg" /usr/local/bin/rg
          rm -rf "$RG_TARBALL" "ripgrep-${RG_VERSION}-x86_64-unknown-linux-musl"
          rg --version
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --locked --python 3.11 --extra all --extra dev
      - name: Minimize uv cache
        run: uv cache prune --ci
      - name: Generate test slices
        id: matrix
        run: |
          MATRIX=$(python3 scripts/run_tests_parallel.py --generate-slices ${{ inputs.slice-count }})
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
      - name: Run tests (slice ${{ matrix.slice.index }}/${{ inputs.slice-count }}
        run: |
          source .venv/bin/activate
          scripts/run_tests.sh --files '${{ matrix.slice.files }}'
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
          # Ensure tests don't accidentally call real APIs
      - name: Upload per-slice durations
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-durations-slice-${{ matrix.slice.index }}
          path: test_durations.json
          retention-days: 1

  # Build job (docker buildx)
  build:
    if: ${{ inputs.run-build }}
    name: Build Docker image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (amd64 and arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64,linux/arm64
          tags: nousresearch/hermes-agent:test
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=docker
          cache-to: type=gha,mode=max,scope=docker