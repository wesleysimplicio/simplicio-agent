# Adapter version floor for Simplicio Agent
# The simplicio-loop preflight BLOCKS when any bound operator is below its
# minimum_version. This manifest documents the required floors so `doctor`
# fails early (before the loop starts) if a venv/pip install drifts behind.
# Keep in sync with the compatibility matrix reported by `simplicio doctor --json`.

[adapters]
simplicio-mapper  = "0.24.1"   # loop survey operator; mapper release aligned with the current ecosystem
simplicio-dev-cli = "0.16.2"   # loop operate operator; mapper-aligned CLI release
simplicio-prompt  = "0.14.1"   # LLM artifact contract producer
simplicio-loop    = "3.38.1"   # evidence-gated loop; current PyPI release
simplicio-runtime = "3.5.2"    # control plane / schema registry
