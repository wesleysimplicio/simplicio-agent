<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Simplicio Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#333;padding:2rem}
h1{color:#009739;font-size:1.5rem;margin-bottom:1rem}
.drag{position:fixed;top:0;left:0;right:0;height:38px;-webkit-app-region:drag;background:#f5f5f5;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;padding:0 1rem;font-size:.8rem;color:#888}
.drag span{color:#009739;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:1rem 0}
.card{background:#f5f5f5;border-radius:8px;padding:1rem;text-align:center}
.card .num{font-size:1.8rem;font-weight:700;color:#009739}
.card .label{font-size:.75rem;color:#888;margin-top:.25rem}
pre{background:#1a1a2e;color:#e0e0e0;padding:1rem;border-radius:8px;font-size:.8rem;overflow:auto;max-height:300px;margin-top:1rem}
button{background:#009739;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem;margin:.25rem}
button:hover{background:#007a2e}
input{padding:.5rem;border:1px solid #ddd;border-radius:6px;font-size:.85rem;flex:1;margin-right:.5rem}
.row{display:flex;margin-bottom:1rem}
</style>
</head>
<body>
<div class="drag">⬡ <span>Simplicio Agent</span> — Desktop</div>
<div style="margin-top:48px">
<h1>⬡ Simplicio Agent</h1>
<div class="stats">
  <div class="card"><div class="num" id="nodes">0</div><div class="label">Nós Ativos</div></div>
  <div class="card"><div class="num" id="savings">0</div><div class="label">Tokens Economizados</div></div>
  <div class="card"><div class="num" id="commands">0</div><div class="label">Comandos</div></div>
  <div class="card"><div class="num" id="status">---</div><div class="label">Status</div></div>
</div>
<div class="row">
  <input id="cmdInput" placeholder="comando simplicio..." onkeydown="if(event.key==='Enter')runCmd()">
  <button onclick="runCmd()">Executar</button>
  <button onclick="loadStatus()">Status</button>
</div>
<pre id="output">$ Simplicio Agent Desktop pronto. Clique em Status para começar.</pre>
</div>
<script>
const { ipcRenderer } = require('electron');
async function runCmd() {
  const cmd = document.getElementById('cmdInput').value || 'status';
  document.getElementById('output').textContent = '$ ' + cmd + '\n';
  const result = await ipcRenderer.invoke('simplicio', cmd);
  document.getElementById('output').textContent += result;
}
async function loadStatus() {
  const result = await ipcRenderer.invoke('simplicio', 'doctor --json');
  try {
    const d = JSON.parse(result);
    document.getElementById('status').textContent = 'OK';
  } catch { document.getElementById('status').textContent = '---'; }
  document.getElementById('output').textContent = result;
}
loadStatus();
</script>
</body></html>
